services:
  strfry:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "7777:7777"
    volumes:
      - strfry-db:/app/strfry-db
      - ./strfry.conf:/app/strfry.conf:ro
    command: ["relay", "--nofiles", "${STRFRY_NOFILES:-524288}"]

  tracker:
    profiles: ["sintel"]
    image: node:22-alpine
    restart: unless-stopped
    command: ["sh", "-lc", "npx --yes bittorrent-tracker@11.2.2 --ws --http --udp --port 8000"]
    ports:
      - "8000:8000"
      - "8000:8000/udp"

  seeder-bot:
    profiles: ["sintel"]
    image: ivnjey/iz-seeder-bot:0.0.1
    command: ["node", "--require", "/app/dist/preload.cjs", "/app/dist/index.js"]
    restart: unless-stopped
    depends_on:
      - strfry
      - tracker
    volumes:
      - ${NOSTREAM_SEEDER_BOT_DIST:-../nostream-seeder-bot/dist}:/app/dist:ro
      - ${NOSTREAM_SEEDER_BOT_NODE_MODULES:-../nostream-seeder-bot/node_modules}:/app/node_modules:ro
      - ./seeder-bot/config.devel.json:/app/config.devel.json:ro
      - ./seeder-bot/upload:/tmp/iz-seeder-bot/upload
      - ./seeder-bot/transcoding:/tmp/iz-seeder-bot/transcoding
      - ./seeder-bot/seeding:/var/tmp/iz-seeder-bot/seeding
      - ./seeder-bot/torrents:/var/tmp/iz-seeder-bot/torrents

  nostream-imdb:
    profiles: ["sintel"]
    image: node:22
    restart: unless-stopped
    working_dir: /app
    command: ["sh", "-lc", "npm run dev"]
    volumes:
      - ${NOSTREAM_IMDB_ROOT:-../nostream-imdb}:/app
      - ${NOSTREAM_IMDB_NODE_MODULES:-../nostream-imdb/node_modules}:/app/node_modules

  browser:
    profiles: ["sintel"]
    image: selenium/standalone-chrome:4.31.0
    restart: unless-stopped
    shm_size: "2gb"
    depends_on:
      - strfry
      - tracker
      - seeder-bot
    ports:
      - "4444:4444"
      - "7900:7900"
    environment:
      - SE_VNC_NO_PASSWORD=1
      - SE_NODE_MAX_SESSIONS=1
      - SE_NODE_OVERRIDE_MAX_SESSIONS=true
      - SE_BROWSER_ARGS_WEBCRYPTO=--unsafely-treat-insecure-origin-as-secure=http://nostream-ui:5173

  nostream-ui:
    profiles: ["sintel"]
    image: node:22
    restart: unless-stopped
    working_dir: /app
    command: ["sh", "-lc", "npm run dev -- --host 0.0.0.0 --port 5173"]
    depends_on:
      - strfry
      - tracker
      - seeder-bot
      - nostream-imdb
    environment:
      - VITE_APPLICATION_RELAY=ws://strfry:7777/
      - VITE_DEFAULT_COMMUNITY_RELAY=ws://strfry:7777/
      - VITE_TORRENT_ANNOUNCE=ws://tracker:8000
      - VITE_IMDB_API=http://nostream-imdb:4000
    volumes:
      - ${NOSTREAM_UI_ROOT:-../nostream-ui}:/app
      - ${NOSTREAM_UI_NODE_MODULES:-../nostream-ui/node_modules}:/app/node_modules
    networks:
      default:
        aliases:
          - iz-stream-ui

volumes:
  strfry-db:
