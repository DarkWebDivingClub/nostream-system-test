services:
  strfry:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "7777:7777"
    volumes:
      - strfry-db:/app/strfry-db
      - ./strfry.conf:/app/strfry.conf:ro
    command: ["relay"]

  tracker:
    profiles: ["sintel"]
    image: node:22-alpine
    restart: unless-stopped
    command: ["sh", "-lc", "npx --yes bittorrent-tracker@11.2.2 --ws --http --udp --port 8000"]
    ports:
      - "8000:8000"
      - "8000:8000/udp"

  seeder-bot:
    profiles: ["sintel"]
    image: ivnjey/iz-seeder-bot:0.0.1
    command: ["node", "--require", "/app/dist/preload.cjs", "/app/dist/index.js"]
    restart: unless-stopped
    depends_on:
      - strfry
      - tracker
    volumes:
      - ../iz-seeder-bot/dist:/app/dist:ro
      - ../iz-seeder-bot/node_modules:/app/node_modules:ro
      - ./seeder-bot/config.devel.json:/app/config.devel.json:ro
      - ./seeder-bot/upload:/tmp/iz-seeder-bot/upload
      - ./seeder-bot/transcoding:/tmp/iz-seeder-bot/transcoding
      - ./seeder-bot/seeding:/var/tmp/iz-seeder-bot/seeding

volumes:
  strfry-db:
